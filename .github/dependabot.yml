version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Argentina/Buenos_Aires
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - astro
          - '@astrojs/*'
      quality:
        patterns:
          - eslint
          - 'eslint-*'
          - prettier
          - 'prettier-*'
          - typescript
          - '@typescript-eslint/*'
