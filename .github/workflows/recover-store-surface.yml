name: Recover Store Surface

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/recover-store-surface.yml'
      - 'scripts/recover-store-surface.mjs'

permissions:
  contents: read
  statuses: write

concurrency:
  group: recover-store-surface
  cancel-in-progress: true

jobs:
  recover:
    name: Capture hydrated store surface
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v6

      - name: Publish surface capture start
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='pending' \
            -f context='shekinah/store-surface' \
            -f description='Capturing hydrated public store surface' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies and Chromium
        run: |
          npm install --package-lock=false --no-audit --no-fund
          npm run install:browsers:ci

      - name: Capture store surface
        env:
          STORE_ORIGIN: https://herbalarioonline.com
          RECOVERY_OUTPUT: .migration-work/store-surface
        run: node scripts/recover-store-surface.mjs

      - name: Upload store surface evidence
        uses: actions/upload-artifact@v7
        with:
          name: shekinah-store-surface-${{ github.sha }}
          path: .migration-work/store-surface
          if-no-files-found: error
          retention-days: 14

      - name: Publish surface capture result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          state='failure'
          description='Store surface capture failed'
          if [[ "$JOB_STATUS" == 'success' ]]; then
            state='success'
            description='Store surface artifact ready'
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context='shekinah/store-surface' \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
