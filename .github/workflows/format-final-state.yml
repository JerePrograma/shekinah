name: Format final project state

on:
  issues:
    types: [opened]

permissions:
  contents: write

concurrency:
  group: format-final-project-state
  cancel-in-progress: false

jobs:
  format:
    if: github.event.issue.title == 'internal: format final shekinah state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format repository
        run: npm run format

      - name: Commit formatting changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style: format consolidated project state [skip ci]"
          git push origin HEAD:main
