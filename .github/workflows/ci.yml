name: CI and GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages-production
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and package application
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout main commit
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npm run install:browsers:ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Validate catalog
        run: npm run validate:content

      - name: Build local production output
        run: npm run build

      - name: Validate generated content
        run: npm run validate:content

      - name: Run unit tests
        run: npm run test:unit

      - name: Run browser tests
        run: npm run test:e2e

      - name: Audit local production output
        run: npm run audit:output

      - name: Audit repository security
        run: npm run audit:secrets

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high --no-package-lock

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build GitHub Pages output
        env:
          SITE_BASE_PATH: /shekinah/
          SITE_ORIGIN: https://jereprograma.github.io/shekinah
        run: npm run build

      - name: Audit GitHub Pages output
        env:
          SITE_BASE_PATH: /shekinah/
          SITE_ORIGIN: https://jereprograma.github.io/shekinah
        run: npm run audit:output

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
