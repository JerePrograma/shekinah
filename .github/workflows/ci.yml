name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate React static application
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install exact declared dependencies
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npm run install:browsers:ci

      - name: Lint React, TypeScript, scripts and tests
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build and prerender public routes
        run: npm run build

      - name: Run architecture and output tests
        run: npm run test:unit

      - name: Run browser tests
        run: npm run test:e2e

      - name: Audit generated output
        run: npm run audit:output

      - name: Audit repository for secrets
        run: npm run audit:secrets

      - name: Dependency audit report
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Upload validated static build
        if: success() && hashFiles('dist/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: shekinah-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload Playwright report
        if: always() && hashFiles('playwright-report/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7
