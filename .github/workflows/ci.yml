name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate recovered static snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run install:browsers:ci

      - name: Require and verify versioned WordPress snapshot
        run: npm run verify:snapshot:required
        env:
          SITE_URL: https://shekinah-7dl.pages.dev

      - name: Validate transition source
        run: npm run check

      - name: Lint repository scripts and tests
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build deployable dist
        run: npm run build
        env:
          SITE_URL: https://shekinah-7dl.pages.dev

      - name: Run unit tests
        run: npm run test:unit

      - name: Parse and smoke-test PowerShell migration
        run: npm run test:powershell

      - name: Run static browser tests
        run: npm run test:e2e

      - name: Audit generated output
        run: npm run audit:output

      - name: Audit repository and snapshot for secrets
        run: npm run audit:secrets

      - name: Dependency audit report
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Upload validated static build
        if: success() && hashFiles('dist/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: shekinah-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload Playwright report
        if: always() && hashFiles('playwright-report/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7
