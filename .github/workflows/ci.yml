name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: shekinah-validation
  cancel-in-progress: true

env:
  SITE_BASE_PATH: /
  SITE_ORIGIN: https://shekinah-7dl.pages.dev

jobs:
  validate:
    name: Validate application
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Publish validation start
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='pending' \
            -f context='shekinah/validation' \
            -f description='Validation in progress' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Checkout main commit
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npm run install:browsers:ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Validate catalog
        run: npm run validate:content

      - name: Build production output
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .ci
          set +e
          npm run build 2>&1 | tee .ci/build.log
          build_code=${PIPESTATUS[0]}
          set -e
          if [[ "$build_code" -ne 0 ]]; then
            detail=$(grep -Ev '^\s*$' .ci/build.log | tail -n 1 | tr '\r\n\t' ' ' | cut -c1-130)
            [[ -n "$detail" ]] || detail='Build failed without diagnostic output'
            gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
              -f state='failure' \
              -f context='shekinah/validation' \
              -f description="$detail" \
              -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" || true
            exit "$build_code"
          fi

      - name: Validate generated content
        run: npm run validate:content

      - name: Run unit tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .ci
          set +e
          npm run test:unit 2>&1 | tee .ci/unit-tests.log
          test_code=${PIPESTATUS[0]}
          set -e
          state='success'
          detail='Unit tests passed'
          context='shekinah/unit-tests'
          if [[ "$test_code" -ne 0 ]]; then
            state='failure'
            detail=$(grep -E '^[[:space:]]*not ok [0-9]+ - ' .ci/unit-tests.log | head -n 1 | sed -E 's/^[[:space:]]*not ok [0-9]+ - //' | tr '\r\n\t' ' ' | cut -c1-96 || true)
            [[ -n "$detail" ]] || detail='Unit tests failed'
            context="shekinah/unit-tests: $detail"
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="$context" \
            -f description="$detail" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" || true
          exit "$test_code"

      - name: Run browser tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .ci
          set +e
          npm run test:e2e 2>&1 | tee .ci/browser-tests.log
          test_code=${PIPESTATUS[0]}
          set -e
          state='success'
          detail='Browser tests passed'
          context='shekinah/browser-tests'
          if [[ "$test_code" -ne 0 ]]; then
            state='failure'
            detail=$(grep -E '^[[:space:]]*[0-9]+\) \[[^]]+\] › ' .ci/browser-tests.log | head -n 1 | sed -E 's/^[[:space:]]*[0-9]+\) //' | tr '\r\n\t' ' ' | cut -c1-96 || true)
            [[ -n "$detail" ]] || detail='Browser tests failed'
            context="shekinah/browser-tests: $detail"
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="$context" \
            -f description="$detail" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" || true
          exit "$test_code"

      - name: Audit output structure
        run: npm run audit:output

      - name: Audit public copy
        run: npm run audit:copy

      - name: Audit repository security
        run: npm run audit:secrets

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high --no-package-lock

      - name: Publish validation result
        if: always()
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          state='failure'
          description='Validation failed'
          if [[ "$JOB_STATUS" == 'success' ]]; then
            state='success'
            description='Validation passed'
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context='shekinah/validation' \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
