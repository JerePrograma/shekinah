name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate React static application
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install exact declared dependencies
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npm run install:browsers:ci

      - name: Lint React, TypeScript, scripts and tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .ci
          set +e
          ./node_modules/.bin/eslint src scripts tests vite.config.ts --format json > .ci/lint.json 2> .ci/lint.stderr
          lint_code=$?
          set -e
          cat .ci/lint.stderr
          if [[ "$lint_code" -eq 0 ]]; then
            printf 'shekinah/lint\tESLint aprobado\n' > .ci/lint-statuses.tsv
            lint_state='success'
          else
            node - <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          let results = [];
          try {
            results = JSON.parse(readFileSync('.ci/lint.json', 'utf8'));
          } catch {
            process.stderr.write('No se pudo decodificar la salida JSON de ESLint.\n');
          }
          const rows = [];
          const seen = new Set();
          for (const result of results) {
            for (const message of result.messages ?? []) {
              const file = result.filePath.replace(`${process.cwd()}/`, '').split('/').slice(-2).join('/');
              const rule = message.ruleId ?? 'parser';
              const detail = `${file}:${message.line ?? 0}:${rule}`
                .replace(/[^A-Za-z0-9_.:/-]/g, '_')
                .slice(0, 75);
              const context = `shekinah/lint/${detail}`;
              if (seen.has(context)) continue;
              seen.add(context);
              const description = `${rule}: ${message.message}`
                .replace(/[\t\r\n]+/g, ' ')
                .slice(0, 130);
              rows.push(`${context}\t${description}`);
              process.stderr.write(`${file}:${message.line ?? 0}:${message.column ?? 0} ${rule} ${message.message}\n`);
              if (rows.length >= 25) break;
            }
            if (rows.length >= 25) break;
          }
          if (!rows.length) rows.push('shekinah/lint/execution\tNo se pudo interpretar la salida de ESLint');
          writeFileSync('.ci/lint-statuses.tsv', `${rows.join('\n')}\n`);
          NODE
            lint_state='failure'
          fi
          export TARGET_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          while IFS=$'\t' read -r context description; do
            [[ -n "$context" ]] || continue
            export STATE="$lint_state"
            export CONTEXT="$context"
            export DESCRIPTION="$description"
            payload=$(node -e "process.stdout.write(JSON.stringify({state:process.env.STATE,context:process.env.CONTEXT,description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))")
            curl --fail-with-body --silent --show-error \
              --request POST \
              --header 'Accept: application/vnd.github+json' \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
              --data "$payload"
          done < .ci/lint-statuses.tsv
          exit "$lint_code"

      - name: Check formatting
        run: npm run format:check

      - name: Validate normalized catalog source
        run: npm run validate:content

      - name: Build and prerender public routes
        run: npm run build

      - name: Validate prerendered catalog output
        run: npm run validate:content

      - name: Run architecture, importer and output tests
        run: npm run test:unit

      - name: Run browser tests
        run: npm run test:e2e

      - name: Audit generated output
        run: npm run audit:output

      - name: Audit repository for secrets
        run: npm run audit:secrets

      - name: Dependency audit report
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Upload validated static build
        if: success() && hashFiles('dist/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: shekinah-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload Playwright report
        if: always() && hashFiles('playwright-report/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload CI diagnostics
        if: always() && hashFiles('.ci/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: ci-diagnostics-${{ github.sha }}
          path: .ci
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish observable CI status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          case "$JOB_STATUS" in
            success)
              state='success'
              description='Validación completa de Shekinah aprobada'
              ;;
            failure)
              state='failure'
              description='La validación de Shekinah falló'
              ;;
            *)
              state='error'
              description='La validación de Shekinah fue cancelada'
              ;;
          esac
          export STATE="$state"
          export DESCRIPTION="$description"
          export TARGET_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          payload=$(node -e "process.stdout.write(JSON.stringify({state:process.env.STATE,context:'shekinah/ci',description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))")
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data "$payload"
