name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  statuses: write

concurrency:
  group: shekinah-clean-room-finalizer-bridge
  cancel-in-progress: false

jobs:
  finalize-clean-room:
    name: Execute verified clean-room finalizer
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout staged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Reconstruct and execute verified payload
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf /tmp/shekinah-finalizer

          cat .clean-room-finalizer-v5/part-* \
            | tr -d '\r\n' \
            | base64 --decode \
            > /tmp/shekinah-finalizer-payload.tar.gz

          printf '%s  %s\n' \
            'b24c59edcd1079499d57fd4c32f85057f7eb64ae6d10bb49de554cd389cc3d6d' \
            '/tmp/shekinah-finalizer-payload.tar.gz' \
            | sha256sum --check --strict

          tar --extract --gzip \
            --file /tmp/shekinah-finalizer-payload.tar.gz \
            --directory /tmp

          bash /tmp/shekinah-finalizer/run.sh
