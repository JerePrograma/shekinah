name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest
    if: hashFiles('package-lock.json') != ''
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Type and content checks
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Formatting
        run: npm run format:check

      - name: Build static output
        run: npm run build
        env:
          SITE_URL: https://shekinah.pages.dev

      - name: Unit and browser tests
        run: npm run test

      - name: Audit generated output
        run: npm run audit:output

      - name: Audit repository for secrets and backups
        run: npm run audit:secrets

      - name: Dependency audit report
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Upload static build
        if: always() && hashFiles('dist/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: shekinah-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload Playwright report
        if: always() && hashFiles('playwright-report/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7
