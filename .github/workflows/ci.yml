name: CI and GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: github-pages-production
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and package application
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Publish validation start
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='pending' \
            -f context='shekinah/validation' \
            -f description='Validation in progress' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Checkout main commit
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npm run install:browsers:ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Validate catalog
        run: npm run validate:content

      - name: Build local production output
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .ci
          set +e
          npm run build 2>&1 | tee .ci/build.log
          build_code=${PIPESTATUS[0]}
          set -e
          if [[ "$build_code" -ne 0 ]]; then
            detail=$(grep -Ev '^\s*$' .ci/build.log | tail -n 1 | tr '\r\n\t' ' ' | cut -c1-130)
            [[ -n "$detail" ]] || detail='Build failed without diagnostic output'
            gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
              -f state='failure' \
              -f context='shekinah/validation' \
              -f description="$detail" \
              -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" || true
            exit "$build_code"
          fi

      - name: Validate generated content
        run: npm run validate:content

      - name: Run unit tests
        run: npm run test:unit

      - name: Run browser tests
        run: npm run test:e2e

      - name: Audit output structure
        run: npm run audit:output

      - name: Audit public copy
        run: npm run audit:copy

      - name: Audit repository security
        run: npm run audit:secrets

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high --no-package-lock

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build GitHub Pages output
        env:
          SITE_BASE_PATH: /shekinah/
          SITE_ORIGIN: https://jereprograma.github.io/shekinah
        run: npm run build

      - name: Audit GitHub Pages output
        env:
          SITE_BASE_PATH: /shekinah/
          SITE_ORIGIN: https://jereprograma.github.io/shekinah
        run: |
          npm run audit:output
          npm run audit:copy

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Publish validation result
        if: always()
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          state='failure'
          description='Validation failed'
          if [[ "$JOB_STATUS" == 'success' ]]; then
            state='success'
            description='Validation passed'
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context='shekinah/validation' \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  deploy:
    name: Deploy and verify GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pages: write
      id-token: write
      statuses: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify production site
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          base="${PAGE_URL%/}"
          [[ -n "$base" ]] || { echo '::error::GitHub Pages no informó una URL'; exit 1; }

          ready='false'
          for attempt in $(seq 1 30); do
            body=$(curl --fail --silent --show-error --location --retry 2 --retry-delay 2 "$base/tienda/" || true)
            if grep -qi '<title>' <<< "$body" && grep -qi 'Shekinah' <<< "$body"; then
              ready='true'
              break
            fi
            sleep 10
          done
          [[ "$ready" == 'true' ]] || { echo '::error::El sitio publicado no quedó disponible'; exit 1; }

          html_routes=(
            /
            /tienda/
            /blog/
            /recetas/
            /guayaba/
          )
          for route in "${html_routes[@]}"; do
            body=$(curl --fail --silent --show-error --location --retry 5 --retry-delay 3 "$base$route")
            grep -qi '<title>' <<< "$body" || { echo "::error::$route no contiene title"; exit 1; }
            grep -qi 'Shekinah' <<< "$body" || { echo "::error::$route no contiene la marca"; exit 1; }
            if grep -Eqi 'productos recuperados|catálogo original recuperado|fuente recuperada|evidencia histórica|contenido versionado|Hostinger|WordPress|migraci[oó]n|Cloudflare|pages\.dev' <<< "$body"; then
              echo "::error::$route expone texto técnico o residual"
              exit 1
            fi
          done

          curl --fail --silent --show-error --location --retry 5 --retry-delay 3 "$base/robots.txt" | grep -qi 'Sitemap:'
          curl --fail --silent --show-error --location --retry 5 --retry-delay 3 "$base/sitemap.xml" | grep -qi '<urlset'

      - name: Publish deployment status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          state='failure'
          description='GitHub Pages deployment or verification failed'
          if [[ "$JOB_STATUS" == 'success' ]]; then
            state='success'
            description='GitHub Pages deployed and verified'
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context='shekinah/github-pages' \
            -f description="$description" \
            -f target_url="${PAGE_URL:-${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}}"
