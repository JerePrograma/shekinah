name: Finalize clean-room rebuild

on:
  push:
    branches: [main]
    paths:
      - '.clean-room-bundle/**'
      - '.clean-room-finalizer/**'
      - '.github/workflows/finalize-clean-room.yml'

permissions:
  contents: write
  actions: write
  statuses: write

concurrency:
  group: shekinah-finalize-clean-room
  cancel-in-progress: false

jobs:
  finalize:
    name: Validate and publish audited tree
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout staged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Execute verified finalizer payload
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf /tmp/shekinah-finalizer

          cat .clean-room-finalizer/part-* \
            | tr -d '\r\n' \
            | base64 --decode \
            > /tmp/shekinah-finalizer-payload.tar.gz

          printf '%s  %s\n' \
            '8d07f73da1415b32c6da73c67cdb6bb59524b6152897eef189bddab9f85e24cc' \
            '/tmp/shekinah-finalizer-payload.tar.gz' \
            | sha256sum --check --strict

          tar --extract --gzip \
            --file /tmp/shekinah-finalizer-payload.tar.gz \
            --directory /tmp

          bash /tmp/shekinah-finalizer/run.sh
