name: Finalize clean-room rebuild

on:
  push:
    branches: [main]
    paths:
      - '.clean-room-bundle/**'
      - '.clean-room-finalizer/**'
      - '.clean-room-finalizer-v2/**'
      - '.clean-room-finalizer-v3/**'
      - '.github/workflows/finalize-clean-room.yml'

permissions:
  contents: write
  actions: write
  statuses: write

concurrency:
  group: shekinah-finalize-clean-room
  cancel-in-progress: false

jobs:
  finalize:
    name: Validate and publish audited tree
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout staged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Execute verified finalizer payload
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf /tmp/shekinah-finalizer

          cat .clean-room-finalizer-v3/part-* \
            | tr -d '\r\n' \
            | base64 --decode \
            > /tmp/shekinah-finalizer-payload.tar.gz

          printf '%s  %s\n' \
            '797c08e3e2ce262d9010cb92d9196fbe97b670bbe6ccfa3651f47038a56a477d' \
            '/tmp/shekinah-finalizer-payload.tar.gz' \
            | sha256sum --check --strict

          tar --extract --gzip \
            --file /tmp/shekinah-finalizer-payload.tar.gz \
            --directory /tmp

          set +e
          bash /tmp/shekinah-finalizer/run.sh 2>&1 \
            | tee /tmp/shekinah-finalizer.log
          finalizer_code=${PIPESTATUS[0]}
          set -e

          if [[ "$finalizer_code" -ne 0 ]]; then
            detail=$(grep -Ev '^\s*$' /tmp/shekinah-finalizer.log \
              | tail -n 1 \
              | tr '\r\n\t' ' ' \
              | cut -c1-130)
            [[ -n "$detail" ]] || detail='Clean-room finalizer failed without diagnostic output'
            gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
              -f state='failure' \
              -f context='shekinah/clean-room-finalizer' \
              -f description="$detail" \
              -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              >/dev/null || true
          fi

          exit "$finalizer_code"

      - name: Upload finalizer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-room-finalizer-${{ github.run_id }}
          path: |
            /tmp/shekinah-finalizer.log
            scripts/validate-catalog.mjs
            src/editorial-content.json
            docs/assets-provenance.json
            docs/provenance-audit.md
          if-no-files-found: warn
          retention-days: 1
