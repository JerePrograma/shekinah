name: Final repository verification

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: final-verification-main
  cancel-in-progress: false

jobs:
  verify:
    name: Verify and record main
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == 'Run final repository verification'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Execute complete verification and write report
        id: verification
        shell: bash
        env:
          SITE_URL: https://shekinah.pages.dev
        run: |
          set +e
          source_sha=$(git rev-parse HEAD)
          started_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          report='docs/CI-VERIFICATION.md'
          overall=0

          cat > "$report" <<EOF
          # Verificación final de CI

          - Commit verificado: \`$source_sha\`
          - Inicio UTC: **$started_at**
          - Runner: **GitHub Actions / ubuntu-latest**
          - Node: **$(node --version)**
          - npm: **$(npm --version)**

          ## Resultados

          | Control | Comando | Código | Resultado |
          | --- | --- | ---: | --- |
          EOF

          run_check() {
            label="$1"
            command="$2"
            log_file=$(mktemp)
            echo "::group::$label"
            bash -o pipefail -c "$command" 2>&1 | tee "$log_file"
            code=${PIPESTATUS[0]}
            echo "::endgroup::"
            if [ "$code" -eq 0 ]; then
              result='APROBADO'
            else
              result='FALLÓ'
              overall=1
            fi
            safe_command=$(printf '%s' "$command" | sed 's/|/\\|/g')
            printf '| %s | `%s` | %s | **%s** |\n' "$label" "$safe_command" "$code" "$result" >> "$report"
            if [ "$code" -ne 0 ]; then
              {
                printf '\n### Error: %s\n\n```text\n' "$label"
                tail -n 80 "$log_file" | sed -r 's/\x1B\[[0-9;]*[mK]//g'
                printf '\n```\n'
              } >> "$report"
            fi
            rm -f "$log_file"
          }

          run_check 'Instalación reproducible' 'npm ci'
          if [ "$overall" -eq 0 ]; then
            run_check 'Chromium de Playwright' 'npx playwright install --with-deps chromium'
            run_check 'Astro y TypeScript' 'npm run check'
            run_check 'ESLint' 'npm run lint'
            run_check 'Prettier' 'npm run format:check'
            run_check 'Build estático' 'npm run build'
            run_check 'Pruebas unitarias' 'npm run test:unit'
            run_check 'Pruebas de navegador' 'npx playwright test'
            run_check 'Auditoría de salida' 'npm run audit:output'
            run_check 'Auditoría de secretos' 'npm run audit:secrets'
            run_check 'Auditoría de dependencias de producción' 'npm audit --omit=dev --audit-level=high'
          fi

          completed_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          if [ "$overall" -eq 0 ]; then
            conclusion='APROBADA'
          else
            conclusion='FALLÓ'
          fi

          cat >> "$report" <<EOF

          ## Conclusión

          Verificación **$conclusion**.

          - Fin UTC: **$completed_at**
          - El informe fue generado por GitHub Actions sobre el commit indicado.
          - Los adjuntos originales no fueron utilizados.
          EOF

          if [ -x node_modules/.bin/prettier ]; then
            npx prettier --write "$report"
          fi

          echo "overall=$overall" >> "$GITHUB_OUTPUT"

      - name: Commit verification report
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/CI-VERIFICATION.md
          git commit -m 'docs: record final CI verification [skip ci]'
          git push origin HEAD:main

      - name: Fail workflow when a control failed
        if: steps.verification.outputs.overall != '0'
        run: exit 1
