name: Deploy Cloudflare Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy validated snapshot
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: cloudflare-pages-production
      url: ${{ steps.publish.outputs.deployment-url }}

    steps:
      - id: source
        name: Resolve validated source commit
        shell: bash
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          [[ -n "$WORKFLOW_RUN_SHA" ]] || { echo '::error::No se recibió el SHA del CI validado'; exit 1; }
          echo "sha=$WORKFLOW_RUN_SHA" >> "$GITHUB_OUTPUT"

      - name: Require Cloudflare credentials
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          [[ -n "$CLOUDFLARE_API_TOKEN" ]] || { echo '::error::Falta CLOUDFLARE_API_TOKEN'; exit 1; }
          [[ -n "$CLOUDFLARE_ACCOUNT_ID" ]] || { echo '::error::Falta CLOUDFLARE_ACCOUNT_ID'; exit 1; }

      - name: Checkout validated commit
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.source.outputs.sha }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run install:browsers:ci

      - name: Reverify production source
        run: npm run verify
        env:
          SITE_URL: https://shekinah-7dl.pages.dev

      - id: publish
        name: Publish dist to Cloudflare Pages
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_COMMIT_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -euo pipefail
          node scripts/deploy-cloudflare.mjs 2>&1 | tee deployment.log
          url=$(grep -Eo 'https://[A-Za-z0-9._-]+\.pages\.dev' deployment.log | tail -n 1 || true)
          if [[ -z "$url" ]]; then
            url='https://shekinah-7dl.pages.dev'
          fi
          echo "deployment-url=$url" >> "$GITHUB_OUTPUT"

      - name: Verify deployment and stable domain
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.publish.outputs.deployment-url }}
          STABLE_URL: https://shekinah-7dl.pages.dev
        run: |
          set -euo pipefail
          for base in "$DEPLOYMENT_URL" "$STABLE_URL"; do
            for route in / /inicio/ /nosotros/ /tienda/ /blog/ /recetas/ /robots.txt; do
              curl --fail --show-error --silent --location \
                --retry 8 --retry-delay 5 \
                "$base$route" > /dev/null
            done
          done
          sitemap_status=$(curl --silent --location --output /dev/null --write-out '%{http_code}' "$STABLE_URL/sitemap.xml")
          if [[ "$sitemap_status" == '404' ]]; then
            sitemap_status=$(curl --silent --location --output /dev/null --write-out '%{http_code}' "$STABLE_URL/sitemap-index.xml")
          fi
          if [[ "$sitemap_status" == '404' ]]; then
            sitemap_status=$(curl --silent --location --output /dev/null --write-out '%{http_code}' "$STABLE_URL/wp-sitemap.xml")
          fi
          [[ "$sitemap_status" == '200' ]] || { echo "::error::Sitemap no disponible: HTTP $sitemap_status"; exit 1; }
