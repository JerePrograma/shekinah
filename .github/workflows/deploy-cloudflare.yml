name: Deploy Cloudflare Pages

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: false

jobs:
  credentials:
    name: Check deployment configuration
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.detect.outputs.configured }}
    steps:
      - id: detect
        name: Detect required secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Cloudflare credentials are configured."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare deployment skipped: configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID."
          fi

  skipped:
    name: Deployment not configured
    needs: credentials
    if: needs.credentials.outputs.configured != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No deployment was attempted because the required repository secrets are absent."

  deploy:
    name: Deploy production build
    needs: credentials
    if: needs.credentials.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: cloudflare-pages-production
      url: ${{ steps.publish.outputs.deployment-url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify production source
        run: npm run verify
        env:
          SITE_URL: https://shekinah-7dl.pages.dev

      - id: publish
        name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -o pipefail
          npx wrangler pages deploy dist --project-name shekinah --branch main 2>&1 | tee deployment.log
          url=$(grep -Eo 'https://[A-Za-z0-9._-]+\.pages\.dev' deployment.log | tail -n 1 || true)
          if [[ -n "$url" ]]; then
            echo "deployment-url=$url" >> "$GITHUB_OUTPUT"
          else
            echo "deployment-url=https://shekinah-7dl.pages.dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify deployed homepage
        env:
          DEPLOYMENT_URL: ${{ steps.publish.outputs.deployment-url }}
        shell: bash
        run: |
          curl --fail --show-error --silent --location \
            --retry 5 --retry-delay 5 \
            "$DEPLOYMENT_URL/" > deployed-home.html
          grep -q '<title>Shekinah</title>' deployed-home.html
