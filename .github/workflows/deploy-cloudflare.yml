name: Deploy Cloudflare Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  statuses: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy validated React application
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: cloudflare-pages-production
      url: ${{ steps.publish.outputs.deployment-url }}

    steps:
      - id: source
        name: Resolve validated source commit
        shell: bash
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          [[ -n "$WORKFLOW_RUN_SHA" ]] || { echo '::error::No se recibió el SHA validado'; exit 1; }
          echo "sha=$WORKFLOW_RUN_SHA" >> "$GITHUB_OUTPUT"

      - name: Require Cloudflare credentials
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          [[ -n "$CLOUDFLARE_API_TOKEN" ]] || { echo '::error::Falta CLOUDFLARE_API_TOKEN'; exit 1; }
          [[ -n "$CLOUDFLARE_ACCOUNT_ID" ]] || { echo '::error::Falta CLOUDFLARE_ACCOUNT_ID'; exit 1; }

      - name: Checkout validated commit
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.source.outputs.sha }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install exact declared dependencies
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npm run install:browsers:ci

      - name: Reverify production source
        run: npm run verify

      - id: publish
        name: Publish dist to Cloudflare Pages
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_COMMIT_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -euo pipefail
          node scripts/deploy-cloudflare.mjs 2>&1 | tee deployment.log
          url=$(grep -Eo 'https://[A-Za-z0-9._-]+\.pages\.dev' deployment.log | tail -n 1 || true)
          [[ -n "$url" ]] || url='https://shekinah-7dl.pages.dev'
          echo "deployment-url=$url" >> "$GITHUB_OUTPUT"

      - name: Verify deployment and stable domain
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.publish.outputs.deployment-url }}
          STABLE_URL: https://shekinah-7dl.pages.dev
        run: |
          set -euo pipefail
          mkdir -p .deploy-diagnostics
          log='.deploy-diagnostics/verify.log'
          : > "$log"

          fail_verification() {
            local detail="$1"
            local message="$2"
            detail=$(printf '%s' "$detail" | tr -cs 'A-Za-z0-9._-' '-' | cut -c1-72)
            printf '%s\n' "$detail" > .deploy-diagnostics/failure-context
            printf 'FAIL %s: %s\n' "$detail" "$message" | tee -a "$log" >&2
            exit 1
          }

          verify_route() {
            local label="$1"
            local base="$2"
            local route="$3"
            local safe_route
            local body
            safe_route=$(printf '%s' "$route" | tr -cs 'A-Za-z0-9._-' '-' | cut -c1-55)
            if ! body=$(curl --fail --show-error --silent --location --retry 8 --retry-delay 5 --retry-all-errors "$base$route"); then
              fail_verification "$label-$safe_route-http" "$base$route no respondió correctamente"
            fi
            if [[ "$route" == */ ]]; then
              grep -qi '<title>' <<< "$body" || fail_verification "$label-$safe_route-title" "$base$route no contiene title"
              grep -qi 'rel="canonical"' <<< "$body" || fail_verification "$label-$safe_route-canonical" "$base$route no contiene canonical"
              ! grep -Eqi 'Hello world!|trans-[a-z_-]+|wp-admin|wp-login|la tienda original no contenía productos|la tienda original no contenía carrito' <<< "$body" || fail_verification "$label-$safe_route-residual" "$base$route conserva contenido residual"
            fi
            printf 'PASS %s%s\n' "$base" "$route" | tee -a "$log"
          }

          ready='false'
          for attempt in $(seq 1 24); do
            body=$(curl --fail --show-error --silent --location --retry 2 --retry-delay 2 --retry-all-errors "$STABLE_URL/guayaba/" || true)
            if grep -qi '<title>' <<< "$body" && grep -qi 'Guayaba hojas x 50 gr' <<< "$body" && grep -qi 'rel="canonical"' <<< "$body"; then
              ready='true'
              printf 'Dominio estable actualizado en intento %s.\n' "$attempt" | tee -a "$log"
              break
            fi
            printf 'Dominio estable todavía no refleja el catálogo; intento %s/24.\n' "$attempt" | tee -a "$log"
            sleep 5
          done
          [[ "$ready" == 'true' ]] || fail_verification 'stable-rollout-guayaba' 'El dominio estable no reflejó el nuevo catálogo dentro de 120 segundos'

          routes=(
            /
            /nosotros/
            /tienda/
            /tienda/categoria/hierbas-medicinales/
            /tienda/categoria/suplementos/
            /guayaba/
            /melena-de-leon-futuro-fungi-50ml/
            /blog/
            /recetas/
            /chocolate-casero/
            /receta-barra-de-cereal/
            /terms-and-conditions/
            /robots.txt
            /sitemap.xml
          )
          for route in "${routes[@]}"; do
            verify_route 'deployment' "$DEPLOYMENT_URL" "$route"
          done
          for route in "${routes[@]}"; do
            verify_route 'stable' "$STABLE_URL" "$route"
          done

      - name: Upload deployment diagnostics
        if: always() && hashFiles('.deploy-diagnostics/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: cloudflare-diagnostics-${{ github.event.workflow_run.head_sha }}
          path: .deploy-diagnostics
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish observable Cloudflare status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          [[ -n "$SOURCE_SHA" ]] || { echo '::error::No se recibió el SHA para publicar el estado'; exit 1; }
          context='shekinah/cloudflare'
          case "$JOB_STATUS" in
            success)
              state='success'
              description='Cloudflare Pages publicado y verificado'
              ;;
            failure)
              state='failure'
              description='El despliegue o la verificación Cloudflare falló'
              if [[ -s .deploy-diagnostics/failure-context ]]; then
                detail=$(cat .deploy-diagnostics/failure-context)
                context="shekinah/cloudflare/${detail:0:72}"
              fi
              ;;
            *)
              state='error'
              description='El despliegue Cloudflare fue cancelado'
              ;;
          esac
          export STATE="$state"
          export CONTEXT="$context"
          export DESCRIPTION="$description"
          export TARGET_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          payload=$(node -e "process.stdout.write(JSON.stringify({state:process.env.STATE,context:process.env.CONTEXT,description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))")
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$SOURCE_SHA" \
            --data "$payload"
