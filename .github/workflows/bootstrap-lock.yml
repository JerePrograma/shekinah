name: Bootstrap npm lockfile

on:
  push:
    branches: [main]
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bootstrap-lock-main
  cancel-in-progress: false

jobs:
  lockfile:
    name: Generate public npm lockfile once
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Skip when lockfile already exists
        id: state
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.state.outputs.needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Generate lockfile
        if: steps.state.outputs.needed == 'true'
        run: npm install --package-lock-only --ignore-scripts --registry=https://registry.npmjs.org

      - name: Commit generated lockfile
        if: steps.state.outputs.needed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: add reproducible npm lockfile"
          git push origin HEAD:main
