name: Final documentation formatting

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    name: Format versioned documentation
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == 'Format final Shekinah documentation'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format README and documentation
        run: npx prettier --write README.md 'docs/*.md'

      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Documentation was already formatted.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md docs
          git commit -m 'style: format project documentation [skip ci]'
          git push origin HEAD:main
