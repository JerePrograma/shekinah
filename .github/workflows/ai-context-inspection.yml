      - name: Install dependencies and Chromium
        shell: bash
        run: |
          set -euo pipefail
          npm install --package-lock=false --no-audit --no-fund
          npm run install:browsers:ci

      - name: Run repository verification
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ai-context-publish/logs"
          npm run verify 2>&1 | tee "$RUNNER_TEMP/ai-context-publish/logs/npm-verify.log"

      - name: Validate Markdown corpus
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          import re
          import subprocess
          import sys

          root = Path.cwd()
          docs = root / 'docs' / 'ai-context'
          expected = {
              'README.md', 'PROJECT-OVERVIEW.md', 'CURRENT-STATE.md', 'ARCHITECTURE.md',
              'REPOSITORY-MAP.md', 'RUNTIME-FLOWS.md', 'DATA-MODEL.md', 'ROUTES-AND-SEO.md',
              'UI-UX-ACCESSIBILITY.md', 'TESTING.md', 'BUILD-AND-LOCAL-DEVELOPMENT.md',
              'CI-CD-AND-DEPLOYMENT.md', 'SECURITY-AND-PRIVACY.md',
              'PROVENANCE-AND-LICENSES.md', 'CONVENTIONS-AND-INVARIANTS.md', 'CHANGE-GUIDE.md',
              'KNOWN-RISKS-AND-DEBT.md', 'DECISION-LOG.md', 'OPEN-QUESTIONS.md',
              'VERIFICATION-MATRIX.md', 'GLOSSARY.md'
          }
          errors = []
          actual = {path.name for path in docs.glob('*.md')}
          if actual != expected:
              errors.append(f'Conjunto incorrecto: faltan={expected-actual}, sobran={actual-expected}')
          reference = '34662b181041667ec0c3864820f14ff44e823b92'
          markers = [
              'Estado del documento:', 'Commit de referencia:', 'Fecha de verificación:',
              'Fuente principal:', '## Evidencia principal', '## Limitaciones',
              '## Cuándo actualizar este documento'
          ]
          for path in sorted(docs.glob('*.md')):
              text = path.read_text(encoding='utf-8')
              for marker in markers:
                  if marker not in text:
                      errors.append(f'{path.name}: falta {marker}')
              if reference not in text:
                  errors.append(f'{path.name}: SHA inconsistente')
              if '\r' in text or not text.endswith('\n'):
                  errors.append(f'{path.name}: formato de líneas inválido')
              for line_number, line in enumerate(text.splitlines(), 1):
                  if line.rstrip() != line:
                      errors.append(f'{path.name}:{line_number}: espacio final')
              headings = [(index, line) for index, line in enumerate(text.splitlines(), 1) if line.startswith('#')]
              lines = text.splitlines()
              for index, (line_number, heading) in enumerate(headings):
                  end = headings[index + 1][0] - 1 if index + 1 < len(headings) else len(lines)
                  if not '\n'.join(lines[line_number:end]).strip():
                      errors.append(f'{path.name}:{line_number}: sección vacía {heading}')
              for match in re.finditer(r'\[[^\]]+\]\(([^)]+)\)', text):
                  target = match.group(1).split('#', 1)[0]
                  if not target or re.match(r'^[a-z]+:', target):
                      continue
                  if not (path.parent / target).resolve().exists():
                      errors.append(f'{path.name}: enlace roto {target}')

          root_readme = (root / 'README.md').read_text(encoding='utf-8')
          if 'docs/ai-context/README.md' not in root_readme:
              errors.append('README.md no enlaza el corpus')

          status = subprocess.check_output(['git', 'status', '--porcelain=v1'], text=True).splitlines()
          for line in status:
              value = line[3:]
              if ' -> ' in value:
                  value = value.split(' -> ', 1)[1]
              if not (value == 'README.md' or value == '.github/workflows/ai-context-inspection.yml' or value.startswith('docs/ai-context/')):
                  errors.append(f'Cambio no autorizado antes del commit: {line}')

          if errors:
              print('\n'.join(errors), file=sys.stderr)
              raise SystemExit(1)
          print(f'Corpus validado: {len(expected)} documentos, enlaces, metadatos, SHA y diff autorizado.')
          PY

      - name: Record unavailable audits without masking them
        shell: bash
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/ai-context-publish/logs/npm-audit.log"
          set +e
          npm audit --omit=dev --audit-level=high > "$output" 2>&1
          code=$?
          set -e
          echo "npm_audit_exit=$code" > "$RUNNER_TEMP/ai-context-publish/audit-status.txt"
          if [[ "$code" -ne 0 ]]; then
            grep -q 'ENOLOCK' "$output" || { cat "$output"; exit "$code"; }
          fi
          node - <<'NODE' > "$RUNNER_TEMP/ai-context-publish/script-availability.json"
          const pkg = require('./package.json');
          console.log(JSON.stringify({
            auditProvenance: Boolean(pkg.scripts?.['audit:provenance']),
            auditLicenses: Boolean(pkg.scripts?.['audit:licenses']),
            hasLockfile: require('node:fs').existsSync('package-lock.json')
          }, null, 2));
          NODE

      - name: Review and commit exact scope
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ai-context-publish"
          git status --short --branch | tee "$RUNNER_TEMP/ai-context-publish/git-status-before.txt"
          git diff --check
          git diff --stat | tee "$RUNNER_TEMP/ai-context-publish/diff-stat-before.txt"
          git diff -- README.md .github/workflows/ai-context-inspection.yml             > "$RUNNER_TEMP/ai-context-publish/tracked-diff-before.patch"

          git add README.md docs/ai-context
          git diff --cached --check
          git diff --cached --stat | tee "$RUNNER_TEMP/ai-context-publish/cached-stat.txt"
          git diff --cached > "$RUNNER_TEMP/ai-context-publish/cached-diff.patch"

          python <<'PY'
          import subprocess
          allowed = {'README.md', '.github/workflows/ai-context-inspection.yml'}
          paths = subprocess.check_output(['git', 'diff', '--cached', '--name-only'], text=True).splitlines()
          unexpected = [path for path in paths if path not in allowed and not path.startswith('docs/ai-context/')]
          if unexpected:
              raise SystemExit(f'Archivos staged inesperados: {unexpected}')
          expected = {'README.md', '.github/workflows/ai-context-inspection.yml'}
          missing = expected - set(paths)
          if missing:
              raise SystemExit(f'Faltan cambios esperados: {missing}')
          print(f'Diff staged autorizado: {len(paths)} archivos.')
          PY

          git fetch origin main
          [[ "$(git rev-parse origin/main)" == '${{ steps.base.outputs.sha }}' ]]             || { echo 'origin/main cambió durante la validación; se cancela sin sobrescribir'; exit 1; }

          git config user.name 'JerePrograma'
          git config user.email '95102411+JerePrograma@users.noreply.github.com'
          git commit -m 'docs: add comprehensive AI technical reference [skip ci]'
          final_sha=$(git rev-parse HEAD)
          git push origin HEAD:main
          git fetch origin main
          remote_sha=$(git rev-parse origin/main)
          [[ "$final_sha" == "$remote_sha" ]]
          echo "sha=$final_sha" >> "$GITHUB_OUTPUT"
          echo "remote_sha=$remote_sha" >> "$GITHUB_OUTPUT"
          {
            git status --short --branch
            git log -1 --oneline --decorate
            git rev-parse HEAD
            git rev-parse origin/main
          } | tee "$RUNNER_TEMP/ai-context-publish/final-git-state.txt"

      - name: Verify repository and production state after push
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          set -euo pipefail
          test ! -e .github/workflows/ai-context-inspection.yml
          test -f docs/ai-context/README.md
          gh api --method POST "repos/${{ github.repository }}/statuses/$FINAL_SHA"             -f state='success'             -f context='shekinah/ai-context-validation'             -f description='AI technical reference validated and published'             -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          report="$RUNNER_TEMP/ai-context-publish/production-smoke.txt"
          : > "$report"
          for route in / /tienda/ /guayaba/ /contacto/; do
            code=$(curl --silent --show-error --location --retry 4 --retry-delay 3 --output /tmp/shekinah-smoke.html --write-out '%{http_code}' "https://shekinah-7dl.pages.dev$route" || true)
            echo -e "$route\t$code" >> "$report"
          done
          headers=$(curl --silent --show-error --head --retry 4 --retry-delay 3 'https://shekinah-7dl.pages.dev/recetas/' || true)
          { echo; echo '/recetas/ headers:'; echo "$headers"; } >> "$report"

      - id: artifact
        name: Upload publication evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shekinah-ai-context-publish-${{ github.run_id }}
          path: ${{ runner.temp }}/ai-context-publish
          if-no-files-found: warn
          retention-days: 7

      - name: Report result and close issue
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          FINAL_SHA: ${{ steps.commit.outputs.sha }}
          REMOTE_SHA: ${{ steps.commit.outputs.remote_sha }}
          ARTIFACT_ID: ${{ steps.artifact.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.artifact.outputs.artifact-url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          body=$(cat <<EOF
          Publicación de autoreferencia finalizada con estado: $JOB_STATUS.

          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Commit: ${{ steps.commit.outputs.sha }}
          - origin/main: ${{ steps.commit.outputs.remote_sha }}
          - Artifact ID: $ARTIFACT_ID
          - Artifact: $ARTIFACT_URL
          EOF
          )
          gh api --method POST "repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" -f body="$body"
          gh api --method PATCH "repos/${{ github.repository }}/issues/$ISSUE_NUMBER"             -f state='closed' -f state_reason='completed' >/dev/null
