name: Temporary AI context publisher

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  actions: read
  statuses: write

concurrency:
  group: shekinah-ai-context-publisher
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.issue.title == 'internal-ai-context-publish-20260724' &&
      github.event.issue.user.login == 'JerePrograma'
    name: Validate and publish AI technical reference
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout current main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Synchronize and record base
        id: base
        shell: bash
        run: |
          set -euo pipefail
          git switch main
          git fetch origin
          git pull --ff-only origin main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git status --short --branch
          git log -10 --oneline --decorate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

