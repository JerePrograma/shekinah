name: Restore Original WordPress Content

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/restore-wordpress-original.yml'
      - 'scripts/restore-wordpress-original.mjs'

permissions:
  contents: write
  statuses: write

concurrency:
  group: restore-original-wordpress-content
  cancel-in-progress: false

jobs:
  restore:
    name: Restore and validate original editorial content
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Publish restoration start
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='pending' \
            -f context='shekinah/wordpress-original' \
            -f description='Restoring original WordPress editorial evidence' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install declared dependencies
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Restore original WordPress evidence
        run: node scripts/restore-wordpress-original.mjs

      - name: Verify complete application
        run: npm run verify

      - name: Review exact generated diff
        shell: bash
        run: |
          set -euo pipefail
          git status --short
          git diff --stat
          git diff --check

          expected=$(printf '%s\n' \
            'docs/fidelity/wordpress-original-manifest.json' \
            'src/content.ts' \
            'src/generated/wordpress-original-content.json' \
            'tests/react/wordpress-original.test.mjs' | sort)
          actual=$(git status --porcelain | sed -E 's/^.. //' | sort)
          diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual")

          ! printf '%s\n' "$actual" | grep -E '(\.env|wp-config|\.sql$|\.php$|\.rar$|\.zip$|node_modules|\.wrangler|playwright-report|test-results)' \
            || { echo '::error::Se generaron archivos sensibles, comprimidos o temporales'; exit 1; }

          test "$(node -e "console.log(require('./src/generated/wordpress-original-content.json').entries.length)")" = '9'
          test "$(node -e "console.log(require('./src/generated/wordpress-original-content.json').storeCrossCheck.productsRecovered)")" = '510'

      - name: Upload restoration evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shekinah-wordpress-original-${{ github.sha }}
          path: |
            docs/fidelity/wordpress-original-manifest.json
            src/generated/wordpress-original-content.json
          if-no-files-found: error
          retention-days: 14

      - id: publish
        name: Commit and push restored content to main
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main
          remote_sha=$(git rev-parse origin/main)
          [[ "$remote_sha" == "$GITHUB_SHA" ]] \
            || { echo "::error::origin/main cambió: esperado $GITHUB_SHA; real $remote_sha"; exit 1; }

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- \
            docs/fidelity/wordpress-original-manifest.json \
            src/content.ts \
            src/generated/wordpress-original-content.json \
            tests/react/wordpress-original.test.mjs
          git diff --cached --check
          git commit -m 'content: restore original WordPress editorial source'
          git push origin HEAD:main
          new_sha=$(git rev-parse HEAD)
          echo "sha=$new_sha" >> "$GITHUB_OUTPUT"

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${new_sha}" \
            -f state='success' \
            -f context='shekinah/wordpress-original' \
            -f description='Original WordPress editorial source restored and verified' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Publish restoration failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='failure' \
            -f context='shekinah/wordpress-original' \
            -f description='Original WordPress restoration failed' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
